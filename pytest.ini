[pytest]
DJANGO_SETTINGS_MODULE = pmjay_fraud_dashboard.settings
python_files = tests.py test_*.py *_tests.py
addopts = --cov=pmjay_fraud_dashboard_app/features --cov=pmjay_fraud_dashboard_app/utils --cov-report=term-missing --cov-report=html
markers =
    unit: Unit tests
    integration: Integration tests
    data_processing: Pandas/Data processing tests
    performance: Performance benchmarking tests

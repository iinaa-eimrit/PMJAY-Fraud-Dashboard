version: "3.9"

services:
  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmjay_fraud_dashboard
    volumes:
      # - .:/app # Removed to prevent Windows SQLite locking error on bind mounts
      # - ./data:/app/data
      # - ./db.sqlite3:/app/db.sqlite3 # Removed due to Windows Docker SQLite disk I/O locking error
      - ./staticfiles:/app/staticfiles

    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=pmjay_fraud_dashboard.settings
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s